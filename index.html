<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>無限登攀デモ (grey-box)</title>
<style>
  html,body{margin:0;height:100%;background:#0b0e13;display:flex;align-items:center;justify-content:center;font-family:system-ui,sans-serif;color:#9aa4b2;overflow:hidden}
  #wrap{display:flex;flex-direction:column;align-items:center;gap:8px}
  canvas{background:#0b0e13;height:94vh;width:calc(94vh * 450 / 800);box-shadow:0 0 40px #0008;border-radius:6px;image-rendering:auto}
  #hint{font-size:12px;opacity:.6;text-align:center;max-width:60vw}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="450" height="800"></canvas>
  <div id="hint">A/D 移動 ・ <b>右Shift</b> 壁キック/ジャンプ ・ A/D長押しでしがみつき(3秒で滑り→離すと落下) ・ Enter 攻撃(↓ポゴ/↑上/前ネイル) ・ <b>Space+W/A/S/D スキル4枠</b>(Space長押し中に上下左右ポップ表示) ・ B/N ダメージ ・ G 鍵+1 ・ H 横穴 ・ R リセット ・ P ポーズ ・ <b>I 無敵</b> ・ <b>O 無限上昇</b> ・ <b>M ボス出現</b>(デバッグ)</div>
</div>
<script src="game.js?v=13"></script>
</body>
</html>
